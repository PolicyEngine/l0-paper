name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out l0-paper
        uses: actions/checkout@v4
        with:
          path: l0-paper

      - name: Check out Populace
        uses: actions/checkout@v4
        with:
          repository: PolicyEngine/populace
          # Pinned to the branch carrying the proximal L1 solver (method="prox",
          # l1_lambda) the L1 arm needs; previously this used the default branch
          # HEAD, so CI silently tracked whatever populace was on. Repoint to the
          # merged commit/tag once the L1 + L2 solver work lands on main.
          ref: l1-proximal-solver
          path: populace

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        working-directory: l0-paper
        run: uv python install 3.13

      - name: Run tests
        working-directory: l0-paper
        # --extra viz so the end-to-end test exercises the figure renderers too.
        run: uv run --locked --extra viz pytest

      - name: Run Ruff
        working-directory: l0-paper
        run: uv run --locked ruff check .
