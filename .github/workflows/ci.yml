name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out l0-paper
        uses: actions/checkout@v4
        with:
          path: l0-paper

      - name: Check out Populace
        uses: actions/checkout@v4
        with:
          repository: PolicyEngine/populace
          path: populace

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        working-directory: l0-paper
        run: uv python install 3.13

      - name: Run tests
        working-directory: l0-paper
        # --extra viz so the end-to-end test exercises the figure renderers too.
        run: uv run --locked --extra viz pytest

      - name: Run Ruff
        working-directory: l0-paper
        run: uv run --locked ruff check .
